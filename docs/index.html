<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کتابخانه مسلمین - Islamic Digital Library</title>
    <meta name="description" content="کتابخانه دیجیتال اسلامی - مجموعه کتاب‌های اسلامی به زبان فارسی">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Include pattern library -->
    <div style="display: none;">
        <div id="svg-patterns"></div>
    </div>

    <!-- Islamic Star Decorations -->
    <div class="pattern-decoration star-top-right">
        <svg width="200" height="200" viewBox="0 0 100 100">
          <g fill="#047857" opacity="0.12">
            <path d="M50,10 L55,40 L70,20 L60,45 L90,35 L65,50 L90,65 L60,55 L70,80 L55,60 L50,90 L45,60 L30,80 L40,55 L10,65 L35,50 L10,35 L40,45 L30,20 L45,40 Z"/>
          </g>
          <circle cx="50" cy="50" r="35" fill="none" stroke="#047857" stroke-width="0.5" opacity="0.2"/>
          <circle cx="50" cy="50" r="25" fill="none" stroke="#047857" stroke-width="0.5" opacity="0.2"/>
        </svg>
    </div>

    <div class="pattern-decoration star-bottom-left">
        <svg width="150" height="150" viewBox="0 0 100 100">
          <g fill="#D97706" opacity="0.1">
            <path d="M50,10 L55,40 L70,20 L60,45 L90,35 L65,50 L90,65 L60,55 L70,80 L55,60 L50,90 L45,60 L30,80 L40,55 L10,65 L35,50 L10,35 L40,45 L30,20 L45,40 Z"/>
          </g>
        </svg>
    </div>

    <!-- Arabesque Corner Decorations -->
    <div class="arabesque-corner top-left">
        <svg width="120" height="120" viewBox="0 0 100 100">
          <path d="M10,10 Q30,20 40,40 Q50,60 60,70 Q70,80 80,90"
                fill="none" stroke="#047857" stroke-width="2" opacity="0.3"/>
          <path d="M5,20 Q20,30 30,45 Q40,60 50,70"
                fill="none" stroke="#D97706" stroke-width="1.5" opacity="0.25"/>
          <circle cx="25" cy="25" r="4" fill="#047857" opacity="0.3"/>
          <circle cx="45" cy="45" r="5" fill="#D97706" opacity="0.25"/>
          <circle cx="65" cy="65" r="4" fill="#047857" opacity="0.3"/>
        </svg>
    </div>

    <!-- Navigation -->
    <nav class="nav">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-text">کتابخانه مسلمین</span>
                <!-- Brush stroke underline -->
                <svg class="logo-brush" width="180" height="12" viewBox="0 0 180 12">
                    <path d="M5,6 Q60,3 90,6 Q120,9 175,6"
                          stroke="#047857" stroke-width="4" fill="none"
                          stroke-linecap="round" opacity="0.4"/>
                    <path d="M10,8 Q50,10 90,8 Q130,6 170,8"
                          stroke="#D97706" stroke-width="2" fill="none"
                          stroke-linecap="round" opacity="0.2"/>
                </svg>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">خانه</a>
                <a href="browse.html" class="nav-link">کتاب‌ها</a>
                <a href="about.html" class="nav-link">درباره</a>
            </div>
        </div>

        <!-- Brush stroke divider -->
        <svg class="nav-brush-divider" width="100%" height="30" viewBox="0 0 1200 30">
            <path d="M0,15 Q300,10 600,15 Q900,20 1200,15"
                  stroke="#047857" stroke-width="2" fill="none" opacity="0.2"/>
            <path d="M0,20 Q300,25 600,20 Q900,15 1200,20"
                  stroke="#D97706" stroke-width="1.5" fill="none" opacity="0.15"/>
        </svg>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <!-- Large brush strokes background -->
        <svg class="hero-brush-bg" width="100%" height="100%" viewBox="0 0 1200 800" preserveAspectRatio="none">
            <!-- Large sweeping brush strokes -->
            <path d="M-100,200 Q300,150 600,200 Q900,250 1300,200"
                  fill="none" stroke="#047857" stroke-width="80" opacity="0.08"
                  stroke-linecap="round"/>
            <path d="M-100,500 Q300,450 600,500 Q900,550 1300,500"
                  fill="none" stroke="#D97706" stroke-width="60" opacity="0.06"
                  stroke-linecap="round"/>
            <!-- Ink wash circles -->
            <circle cx="900" cy="200" r="150" fill="#047857" opacity="0.05"/>
            <circle cx="300" cy="600" r="200" fill="#D97706" opacity="0.04"/>
        </svg>

        <div class="container">
            <div class="hero-content">
                <!-- Islamic ornament above title -->
                <svg class="hero-ornament" width="100" height="100" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" fill="none" stroke="#047857" stroke-width="1" opacity="0.3"/>
                    <path d="M50,10 L54,46 L65,18 L58,48 L85,30 L62,52 L85,70 L58,52 L65,82 L54,54 L50,90 L46,54 L35,82 L42,52 L15,70 L38,52 L15,30 L42,48 L35,18 L46,46 Z"
                          fill="#047857" opacity="0.15"/>
                    <circle cx="50" cy="50" r="8" fill="#D97706" opacity="0.3"/>
                </svg>

                <h1 class="hero-title">
                    <span class="title-main">کتاب‌های اسلامی</span>
                    <span class="title-sub">به زبان فارسی</span>
                </h1>

                <!-- Decorative brush stroke under title -->
                <svg class="title-brush-decoration" width="400" height="40" viewBox="0 0 400 40">
                    <path d="M50,20 Q150,10 200,20 Q250,30 350,20"
                          stroke="#D97706" stroke-width="6" fill="none"
                          stroke-linecap="round" opacity="0.3"/>
                    <path d="M70,25 Q140,28 200,25 Q260,22 330,25"
                          stroke="#047857" stroke-width="3" fill="none"
                          stroke-linecap="round" opacity="0.2"/>
                </svg>

                <p class="hero-subtitle">مجموعه‌ای منتخب از کتب اسلامی برای مطالعه و پژوهش</p>

                <a href="browse.html" class="cta-button">
                    <span>مشاهده کتاب‌ها</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                </a>

                <!-- Brush splash accent -->
                <svg class="brush-splash" width="200" height="200" viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="80" fill="#047857" opacity="0.08"/>
                    <circle cx="80" cy="80" r="20" fill="#047857" opacity="0.12"/>
                    <circle cx="130" cy="110" r="15" fill="#D97706" opacity="0.1"/>
                    <circle cx="110" cy="140" r="10" fill="#D97706" opacity="0.08"/>
                </svg>
            </div>
        </div>

        <!-- Bottom decorative stroke -->
        <svg class="hero-bottom-brush" width="100%" height="80" viewBox="0 0 1200 80">
            <path d="M0,40 Q300,20 600,40 Q900,60 1200,40"
                  stroke="#047857" stroke-width="12" fill="none" opacity="0.15"
                  stroke-linecap="round"/>
            <path d="M0,50 Q300,65 600,50 Q900,35 1200,50"
                  stroke="#D97706" stroke-width="8" fill="none" opacity="0.12"
                  stroke-linecap="round"/>
        </svg>
    </section>

    <!-- Books Section -->
    <section class="books">
        <!-- Decorative pattern header -->
        <div class="pattern-header">
            <svg width="200" height="40" viewBox="0 0 200 40">
                <use href="#geometric-border" x="0" y="0"/>
            </svg>
        </div>

        <div class="container">
            <h2 class="section-title">
                کتاب‌ها
                <!-- Ornament beside title -->
                <svg class="title-ornament" width="60" height="60" viewBox="0 0 60 60">
                    <circle cx="30" cy="30" r="20" fill="none" stroke="#D97706" stroke-width="1" opacity="0.4"/>
                    <circle cx="30" cy="30" r="10" fill="#D97706" opacity="0.2"/>
                    <circle cx="30" cy="30" r="5" fill="#047857" opacity="0.3"/>
                </svg>
            </h2>

            <div class="books-grid" id="books-grid">
                <div class="loading">در حال بارگذاری...</div>
            </div>
        </div>

        <!-- Bottom brush accents -->
        <svg class="section-brush-accent" width="100%" height="100" viewBox="0 0 1200 100">
            <path d="M200,50 Q400,30 600,50 Q800,70 1000,50"
                  stroke="#047857" stroke-width="4" fill="none" opacity="0.15"
                  stroke-linecap="round"/>
        </svg>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <!-- Decorative brush separator -->
        <svg class="footer-brush" width="100%" height="60" viewBox="0 0 1200 60">
            <path d="M0,30 Q300,15 600,30 Q900,45 1200,30"
                  stroke="#047857" stroke-width="6" fill="none" opacity="0.2"
                  stroke-linecap="round"/>
            <circle cx="600" cy="30" r="8" fill="#D97706" opacity="0.25"/>
            <circle cx="400" cy="35" r="5" fill="#047857" opacity="0.15"/>
            <circle cx="800" cy="25" r="5" fill="#047857" opacity="0.15"/>
        </svg>

        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="footer-logo">کتابخانه مسلمین</span>
                    <span class="footer-tagline">Islamic Digital Library</span>
                </div>
                <a href="https://github.com/zakariaf/Muslim-Library-App-Persian-Books" class="footer-link">
                    GitHub →
                </a>
            </div>
        </div>

        <!-- Corner arabesque -->
        <div class="footer-arabesque">
            <svg width="100" height="100" viewBox="0 0 100 100">
                <path d="M10,90 Q20,70 30,60 Q40,50 50,45 Q60,40 70,30 Q80,20 90,10"
                      fill="none" stroke="#047857" stroke-width="2" opacity="0.2"/>
                <circle cx="30" cy="70" r="4" fill="#D97706" opacity="0.25"/>
                <circle cx="50" cy="50" r="5" fill="#047857" opacity="0.2"/>
                <circle cx="70" cy="30" r="4" fill="#D97706" opacity="0.25"/>
            </svg>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
